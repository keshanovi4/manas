<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зеркало Рейтинга Абитуриентов Манас (с фото)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen text-gray-800">

    <div class="flex flex-col md:flex-row min-h-screen">

        <div class="w-full md:w-80 bg-emerald-900 text-white p-4 shrink-0 shadow-lg md:max-h-screen md:overflow-y-auto">
            <div class="mb-6 border-b border-emerald-700 pb-4">
                <h1 class="text-xl font-bold tracking-wide">КТУ Манас</h1>
                <p class="text-xs text-emerald-300 mt-1">Мониторинг абитуриентов с фото</p>
            </div>

            <h2 class="text-xs font-bold uppercase tracking-wider text-emerald-400 mb-3">Выберите направление:</h2>
            <div id="menu-container" class="space-y-4 text-sm">
                <p class="text-emerald-200 animate-pulse">Загрузка списка направлений...</p>
            </div>
        </div>

        <div class="flex-1 p-4 md:p-8 md:max-h-screen md:overflow-y-auto">

            <div id="current-info" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6 hidden">
                <h2 id="info-faculty" class="text-xs font-bold text-emerald-700 uppercase tracking-wider"></h2>
                <h3 id="info-dep" class="text-xl font-bold text-gray-800 mt-1"></h3>
                <p id="info-count" class="text-xs text-gray-500 mt-2 font-medium"></p>
            </div>

            <div id="table-card" class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-200 text-gray-700 font-semibold uppercase text-xs tracking-wider">
                                <th class="p-3 text-center w-16">№</th>
                                <th class="p-3">Регистрационный № (Кликни для фото)</th>
                                <th class="p-3">Баллы</th>
                                <th class="p-3">Иностранный язык</th>
                                <th class="p-3">Дата регистрации</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="welcome-message" class="flex flex-col items-center justify-center h-64 text-center text-gray-400">
                <svg class="w-16 h-16 stroke-current mb-2" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                <p class="text-base font-medium">Выберите факультет и направление в меню слева, чтобы увидеть список абитуриентов</p>
            </div>

        </div>
    </div>

    <div id="photo-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-xs flex items-center justify-center z-50 p-4" onclick="closeModal()">
        <div class="bg-white rounded-2xl p-4 max-w-xs w-full relative shadow-2xl animate-fade-in" onclick="event.stopPropagation()">
            <button class="absolute top-2 right-4 text-gray-400 hover:text-gray-700 text-2xl font-bold cursor-pointer" onclick="closeModal()">×</button>

            <div class="mt-4 rounded-xl overflow-hidden border border-gray-100 bg-gray-50 flex items-center justify-center aspect-[3/4] shadow-inner">
                <img id="modal-img" src="" alt="Фото абитуриента" class="w-full h-full object-cover">
            </div>

            <button class="mt-4 w-full bg-emerald-700 hover:bg-emerald-800 text-white font-medium py-2.5 rounded-xl text-sm transition-colors cursor-pointer" onclick="closeModal()">
                Закрыть окно
            </button>
        </div>
    </div>

    <script>
        let globalDatabase = {};

        // Загрузка большой базы данных из data.json
        async function init() {
            try {
                const response = await fetch('data.json');
                globalDatabase = await response.json();
                renderMenu();
            } catch (error) {
                document.getElementById('menu-container').innerHTML = `<p class="text-red-400 font-medium">Ошибка загрузки data.json. Убедитесь, что скрипт-парсер успешно отработал.</p>`;
                console.error(error);
            }
        }

        // Построение бокового меню (Группировка Направлений по Факультетам)
        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            for (const faculty in globalDatabase) {
                const facultyBlock = document.createElement('div');
                facultyBlock.className = 'border-b border-emerald-800/60 pb-3';

                facultyBlock.innerHTML = `
                    <div class="font-bold text-emerald-300 text-xs uppercase tracking-wider mb-2 mt-2 break-words opacity-80">${faculty}</div>
                    <ul class="space-y-1 pl-1">
                        ${Object.keys(globalDatabase[faculty]).map(dep => `
                            <li>
                                <button onclick="selectDepartment('${escapeStr(faculty)}', '${escapeStr(dep)}')" class="w-full text-left py-1.5 px-2 rounded-lg hover:bg-emerald-800/50 text-emerald-100 transition-colors cursor-pointer block truncate text-xs font-medium">
                                    • ${dep}
                                </button>
                            </li>
                        `).join('')}
                    </ul>
                `;
                container.appendChild(facultyBlock);
            }
        }

        // Переключение направления и отрисовка соответствующей таблицы
        function selectDepartment(faculty, dep) {
            document.getElementById('welcome-message').classList.add('hidden');
            document.getElementById('current-info').classList.remove('hidden');
            document.getElementById('table-card').classList.remove('hidden');

            document.getElementById('info-faculty').innerText = faculty;
            document.getElementById('info-dep').innerText = dep;

            const students = globalDatabase[faculty][dep] || [];
            document.getElementById('info-count').innerText = `Всего подано заявлений: ${students.length}`;

            const tbody = document.getElementById('table-body');
            if (students.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-400 font-medium">Нет зарегистрированных абитуриентов</td></tr>`;
                return;
            }

            tbody.innerHTML = students.map(st => `
                <tr class="border-b border-gray-100 hover:bg-emerald-50/40 odd:bg-gray-50/20 transition-colors">
                    <td class="p-3 text-center text-gray-500 font-medium">${st.id}</td>
                    <td class="p-3">
                        <button onclick="openModal('${st.photoUrl}')" class="text-emerald-700 hover:text-emerald-900 underline font-bold tracking-wide cursor-pointer text-left focus:outline-none">
                            ${st.regNum}
                        </button>
                    </td>
                    <td class="p-3 font-semibold text-gray-800">${st.score}</td>
                    <td class="p-3 text-gray-600">${st.langScore || '-'}</td>
                    <td class="p-3 text-gray-400 text-xs">${st.regDate}</td>
                </tr>
            `).join('');
        }

        // Модалка управления фотографиями
        function openModal(url) {
            const modal = document.getElementById('photo-modal');
            const img = document.getElementById('modal-img');
            img.src = url;
            img.onerror = () => { img.src = 'https://via.placeholder.com/150x200?text=Фото+отсутствует'; };
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('photo-modal').classList.add('hidden');
        }

        // Вспомогательная очистка строк для вызовов функций внутри HTML
        function escapeStr(str) {
            return str.replace(/'/g, "\\'");
        }

        init();
    </script>
</body>
</html>
